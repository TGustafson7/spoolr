<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spoolr · Every Show, Remembered</title>
  <meta name="description" content="Your concert history, all in one place. Log the shows. Keep the feeling." />
  <meta property="og:title" content="Spoolr · Every Show, Remembered" />
  <meta property="og:description" content="Your concert history, all in one place. Log the shows. Keep the feeling." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #111110;
      --bg2:        #1a1a18;
      --bg3:        #222220;
      --border:     rgba(255,255,255,0.08);
      --border2:    rgba(255,255,255,0.14);
      --accent:     #e8b86d;
      --accent2:    #c9974a;
      --text1:      #f0ede6;
      --text2:      #a09d96;
      --text3:      #6a6762;
      --cream:      #f0e9d8;
      --radius:     14px;
      --radius-sm:  8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text1);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.6;
    }

    .wrap { max-width: 480px; margin: 0 auto; padding: 0 24px; }

    header {
      padding: 28px 0 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      letter-spacing: 0.01em;
      color: var(--cream);
    }

    .brand-tagline {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-left: auto;
    }

    .show-hero {
      padding: 32px 0 0;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    .show-meta-line {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .show-artist {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(32px, 8vw, 48px);
      line-height: 1.05;
      color: var(--cream);
      margin-bottom: 10px;
    }

    .show-details {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .show-venue { font-size: 14px; color: var(--text2); }

    .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
    }

    .mood-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(232,184,109,0.12);
      border: 1px solid rgba(232,184,109,0.25);
      border-radius: 20px;
      padding: 3px 10px 3px 7px;
      font-size: 12px;
      color: var(--accent);
    }

    .mood-emoji { font-size: 14px; }

    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
      margin: 28px 0;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .card-body { font-size: 15px; color: var(--text1); line-height: 1.55; }

    .standout-card { display: flex; gap: 14px; }

    .standout-bar {
      width: 2px;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0.6;
      flex-shrink: 0;
      min-height: 40px;
    }

    .standout-star {
      font-size: 11px;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 6px;
    }

    .setlist-card { padding: 0; overflow: hidden; }

    .setlist-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .set-separator {
      padding: 8px 20px;
      background: var(--bg3);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.75;
      border-bottom: 1px solid var(--border);
    }

    .song-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
    }

    .song-row:last-child { border-bottom: none; }

    .song-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      opacity: 0.4;
      width: 22px;
      flex-shrink: 0;
    }

    .song-name { font-size: 14px; color: var(--text1); flex: 1; }

    .setlist-truncated {
      padding: 12px 20px;
      font-size: 12px;
      color: var(--text3);
      font-style: italic;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    .mockup-section {
      padding: 48px 0 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.5s forwards;
    }

    .phone-wrap { position: relative; width: 220px; }

    .phone-frame {
      width: 220px;
      height: 440px;
      background: var(--bg2);
      border: 1.5px solid var(--border2);
      border-radius: 36px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 40px 80px rgba(0,0,0,0.6), 0 0 60px rgba(232,184,109,0.04);
    }

    .phone-notch {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 20px;
      background: var(--bg);
      border-radius: 10px;
      z-index: 10;
    }

    .phone-screen {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #1a1a18 0%, #111110 60%, #1c1a14 100%);
      display: flex;
      flex-direction: column;
      padding: 48px 16px 20px;
      gap: 10px;
    }

    .phone-screen-bar { height: 6px; border-radius: 3px; background: var(--border2); }
    .phone-screen-bar.accent { background: rgba(232,184,109,0.3); width: 60%; }
    .phone-screen-bar.short  { width: 40%; }
    .phone-screen-bar.xshort { width: 25%; }

    .phone-screen-card {
      background: var(--bg3);
      border-radius: 8px;
      height: 52px;
      border: 1px solid var(--border);
      margin-top: 4px;
    }

    .phone-screen-rows { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

    .phone-row { display: flex; gap: 8px; align-items: center; }

    .phone-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      flex-shrink: 0;
    }

    .phone-line { height: 5px; border-radius: 3px; background: var(--border2); flex: 1; }

    .phone-glow {
      position: absolute;
      bottom: -30px; left: 50%;
      transform: translateX(-50%);
      width: 140px; height: 40px;
      background: var(--accent);
      opacity: 0.08;
      filter: blur(24px);
      border-radius: 50%;
    }

    .cta-section {
      padding: 8px 0 60px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    .cta-heading {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 7vw, 38px);
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .cta-sub {
      font-size: 15px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #111110;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: 0 8px 32px rgba(232,184,109,0.25);
    }

    .cta-btn:hover {
      background: var(--cream);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(232,184,109,0.35);
    }

    .cta-btn:active { transform: translateY(0); }

    .cta-fine {
      margin-top: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.6s forwards;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
    }

    .footer-right {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.06em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.3s; }
    .card:nth-child(3) { animation-delay: 0.4s; }

    .empty-state { padding: 80px 0; text-align: center; }
    .empty-reel  { margin: 0 auto 24px; opacity: 0.25; }
    .empty-heading { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--cream); margin-bottom: 10px; }
    .empty-sub { font-size: 14px; color: var(--text3); }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <svg width="32" height="32" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="150" cy="150" r="118" stroke="#f0e9d8" stroke-width="13"/>
      <circle cx="150" cy="150" r="88"  stroke="#f0e9d8" stroke-width="2" opacity="0.28"/>
      <circle cx="150" cy="150" r="62"  stroke="#f0e9d8" stroke-width="2" opacity="0.2"/>
      <circle cx="150" cy="150" r="38"  stroke="#f0e9d8" stroke-width="2" opacity="0.14"/>
      <circle cx="150" cy="150" r="20"  stroke="#f0e9d8" stroke-width="9"/>
      <circle cx="150" cy="150" r="7"   fill="#f0e9d8"/>
      <line x1="150" y1="150" x2="215" y2="55" stroke="#f0e9d8" stroke-width="12" stroke-linecap="round"/>
    </svg>
    <span class="brand-name">Spoolr</span>
    <span class="brand-tagline">Every show, remembered</span>
  </header>

  <div id="content"></div>

</div>

<script>
function getShowData() {
  try {
    const d = new URLSearchParams(window.location.search).get('d');
    if (!d) return null;
    return JSON.parse(atob(decodeURIComponent(d)));
  } catch(e) { return null; }
}

function isSep(s) { return s.startsWith('---') && s.endsWith('---'); }
function sepLabel(s) { return s.replace(/^---\s*/,'').replace(/\s*---$/,'').toUpperCase(); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function reelSVG(size, opacity) {
  const op = opacity || 1;
  return `<svg width="${size}" height="${size}" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:${op}">
    <circle cx="150" cy="150" r="118" stroke="#f0e9d8" stroke-width="13"/>
    <circle cx="150" cy="150" r="88"  stroke="#f0e9d8" stroke-width="2" opacity="0.28"/>
    <circle cx="150" cy="150" r="62"  stroke="#f0e9d8" stroke-width="2" opacity="0.2"/>
    <circle cx="150" cy="150" r="38"  stroke="#f0e9d8" stroke-width="2" opacity="0.14"/>
    <circle cx="150" cy="150" r="20"  stroke="#f0e9d8" stroke-width="9"/>
    <circle cx="150" cy="150" r="7"   fill="#f0e9d8"/>
    <line x1="150" y1="150" x2="215" y2="55" stroke="#f0e9d8" stroke-width="12" stroke-linecap="round"/>
  </svg>`;
}

function renderSetlist(setlist) {
  if (!setlist || !setlist.length) return '';
  const MAX = 24;
  const realSongs = setlist.filter(s => !isSep(s));
  let rows = '', shown = 0, num = 0;
  for (const s of setlist) {
    if (isSep(s)) {
      rows += `<div class="set-separator">${sepLabel(s)}</div>`;
    } else {
      if (shown >= MAX) continue;
      num++; shown++;
      rows += `<div class="song-row"><span class="song-num">${String(num).padStart(2,'0')}</span><span class="song-name">${esc(s)}</span></div>`;
    }
  }
  const trunc = realSongs.length > MAX ? `<div class="setlist-truncated">+ ${realSongs.length - MAX} more songs</div>` : '';
  return `<div class="card setlist-card" style="animation-delay:0.4s">
    <div class="setlist-header"><div class="card-label">Setlist · ${realSongs.length} songs</div></div>
    ${rows}${trunc}
  </div>`;
}

function renderMockup() {
  const rows = [68,52,78,44,62,50,72,40,58,66].map(w =>
    `<div class="phone-row"><div class="phone-dot"></div><div class="phone-line" style="width:${w}%"></div></div>`
  ).join('');
  return `<div class="mockup-section">
    <div class="phone-wrap">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <!-- Replace .phone-screen div with <img src="screenshot.png" style="width:100%;display:block;" alt="Spoolr"> when ready -->
        <div class="phone-screen">
          <div class="phone-screen-bar accent"></div>
          <div class="phone-screen-bar short" style="margin-top:4px"></div>
          <div class="phone-screen-bar xshort"></div>
          <div class="phone-screen-card"></div>
          <div class="phone-screen-rows">${rows}</div>
        </div>
      </div>
      <div class="phone-glow"></div>
    </div>
  </div>`;
}

function renderCTA() {
  return `<div class="cta-section">
    <h2 class="cta-heading">Every show,<br><em>remembered.</em></h2>
    <p class="cta-sub">Your concert history, all in one place. Log the shows. Keep the feeling.</p>
    <a href="https://apps.apple.com/app/spoolr/id0000000000" class="cta-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M14.25 9.56c-.02-1.56.71-2.74 2.17-3.6-.82-1.17-2.06-1.82-3.7-1.87-1.55-.05-3.24 1-3.86 1-.65 0-2.16-.96-3.36-.93-1.72.03-3.32 1.05-4.2 2.65-1.8 3.12-.46 7.74 1.28 10.27.87 1.24 1.9 2.62 3.24 2.57 1.3-.05 1.79-.84 3.36-.84 1.56 0 2.01.84 3.37.81 1.41-.02 2.29-1.25 3.14-2.5a10.3 10.3 0 0 0 1.42-2.88c-1.55-.64-2.55-2.1-2.57-3.68ZM11.7 2.7C12.4 1.84 12.74.8 12.64 0c-.95.07-2.1.67-2.77 1.53-.62.8-1.04 1.83-.93 2.78 1.04.08 2.08-.5 2.76-1.61Z" fill="#111110"/>
      </svg>
      Get Spoolr · $4.99
    </a>
    <p class="cta-fine">One-time purchase · No subscription · Your data stays on your phone</p>
  </div>`;
}

function renderFooter() {
  return `<footer>
    <div class="footer-brand">${reelSVG(16, 0.4)} Shared via Spoolr</div>
    <div class="footer-right">Every show, remembered</div>
  </footer>`;
}

function renderShow(show) {
  document.title = `${show.artist || 'Show'} · Spoolr`;
  const standoutHTML = (show.standout||'').trim() ? `
    <div class="card" style="animation-delay:0.3s">
      <div class="card-label">Standout Moment</div>
      <div class="standout-card">
        <div class="standout-bar"></div>
        <div><div class="standout-star">★</div><div class="card-body">${esc(show.standout)}</div></div>
      </div>
    </div>` : '';
  const notesHTML = (show.notes||'').trim() ? `
    <div class="card" style="animation-delay:0.45s">
      <div class="card-label">Notes</div>
      <div class="card-body">${esc(show.notes)}</div>
    </div>` : '';
  return `
    <div class="show-hero">
      <div class="show-meta-line">Shared via Spoolr</div>
      <h1 class="show-artist">${esc(show.artist||'')}</h1>
      <div class="show-details">
        ${show.date  ? `<span class="show-venue">${esc(show.date)}</span>` : ''}
        ${show.date && show.venue ? '<span class="dot"></span>' : ''}
        ${show.venue ? `<span class="show-venue">${esc(show.venue)}</span>` : ''}
        ${show.mood  ? `<span class="mood-pill"><span class="mood-emoji">${show.mood}</span><span>${esc(show.moodLabel||'')}</span></span>` : ''}
      </div>
    </div>
    <div class="section-divider"></div>
    ${standoutHTML}
    ${renderSetlist(show.setlist)}
    ${notesHTML}
    ${renderMockup()}
    ${renderCTA()}
    ${renderFooter()}`;
}

function renderEmpty() {
  return `<div class="empty-state">
    <div class="empty-reel">${reelSVG(72, 0.25)}</div>
    <p class="empty-sub">Your concert history, all in one place.</p>
  </div>
  ${renderCTA()}
  ${renderFooter()}`;
}

const show = getShowData();
document.getElementById('content').innerHTML = show ? renderShow(show) : renderEmpty();
</script>
</body>
</html>
